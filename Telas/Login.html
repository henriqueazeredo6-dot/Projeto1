<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONFIE - Entrar</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="auth-layout">
        <section class="auth-brand">
            <div class="brand-block">
                <h1 class="brand-title">CONFIE Personal</h1>
                <p class="brand-copy">Gestao profissional de personal training</p>
            </div>
        </section>

        <section class="auth-panel">
            <div class="auth-panel-inner">
                <h2>Entrar</h2>
                <p class="auth-subtitle">Acesse sua conta</p>

                {% if sucesso %}
                <section class="student-feedback student-feedback-success" aria-label="Mensagem de sucesso">
                    <p>{{ sucesso }}</p>
                </section>
                {% endif %}

                {% if erro %}
                <section class="student-feedback student-feedback-error" aria-label="Mensagem de erro">
                    <p>{{ erro }}</p>
                </section>
                {% endif %}

                <form action="{{ login_url|default('/login', true) }}" method="post">
                    <input type="hidden" name="next" value="{{ next_url|default('', true) }}">

                    <div class="field">
                        <label for="email">Email</label>
                        <input id="email" name="email" type="email" placeholder="seu@email.com" value="{{ form.email if form is defined else '' }}" required>
                    </div>

                    <div class="field">
                        <label for="senha">Senha</label>
                        <input id="senha" name="senha" type="password" placeholder="********" required>
                    </div>

                    <div class="checkbox-row">
                        <input type="checkbox" id="lembrar" name="lembrar" value="1" {% if form is defined and form.lembrar %}checked{% endif %}>
                        <label for="lembrar">Manter conectado neste dispositivo</label>
                    </div>

                    <button class="button-block" type="submit">Entrar</button>
                </form>

                <p class="link-row">Nao tem uma conta? <a href="{{ cadastro_url|default('/cadastro', true) }}">Cadastre-se</a></p>
                <a class="back-link" href="{{ home_url|default('/', true) }}">Voltar para home</a>
            </div>
        </section>
    </main>
</body>
</html>
