<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONFIE - Entrar</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="auth-layout">
        <section class="auth-brand">
            <div class="brand-block">
                <h1 class="brand-title">CONFIE Personal</h1>
                <p class="brand-copy">Gestão Profissional de Personal Training</p>
            </div>
        </section>

        <section class="auth-panel">
            <div class="auth-panel-inner">
                <h2>Entrar</h2>
                <p class="auth-subtitle">Acesse sua conta</p>

                <form>
                    <div class="field">
                        <label for="email">Email</label>
                        <input id="email" name="email" type="email" placeholder="seu@email.com" required>
                    </div>

                    <div class="field">
                        <label for="senha">Senha</label>
                        <input id="senha" name="senha" type="password" placeholder="••••••••" required>
                    </div>

                    <button class="button-block" type="submit">→ Entrar</button>
                </form>

                <p class="link-row">Não tem uma conta? <a href="Cadastro.html">Cadastre-se</a></p>
                <a class="back-link" href="index.html">← Voltar para home</a>
            </div>
        </section>
    </main>
</body>
</html>
