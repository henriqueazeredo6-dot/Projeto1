<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cadastro - CONFIE Personal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main>
        <section>
            <h1>CONFIE Personal</h1>
            <p>Gestão Profissional de Personal Training</p>
        </section>

        <section>
            <h2>CADASTRO</h2>
            <p>Crie sua conta gratuita</p>

            <form>
                <label>NOME COMPLETO</label>
                <br>
                <input type="text" placeholder="Seu nome">
                <br><br>

                <label>EMAIL</label>
                <br>
                <input type="email" placeholder="seu@email.com">
                <br><br>

                <label>DATA DE NASCIMENTO</label>
                <br>
                <input type="date">
                <br><br>

                <label>TIPO DE CONTA</label>
                <br>
                <select>
                    <option>Personal Trainer</option>
                    <option>Aluno</option>
                </select>
                <br><br>

                <label>SENHA</label>
                <br>
                <input type="password" placeholder="........">
                <br><br>

                <label>CONFIRMAR SENHA</label>
                <br>
                <input type="password" placeholder="........">
                <br><br>

                <div>
                    <input type="checkbox" id="termos">
                    <label for="termos">Eu aceito os Termos e Condições e a Política de Privacidade</label>
                </div>
                <br>

                <button type="submit">CRIAR CONTA</button>
            </form>

            <p>Já tem uma conta? <a href="login.html">Faça login</a></p>
            <a href="index.html">← Voltar para Tela Inicial</a>

        </section>
    </main>

</body>
</html>
