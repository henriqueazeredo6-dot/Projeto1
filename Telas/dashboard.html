<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - CONFIE</title>
     <link rel="stylesheet" href="style.css"> 
     
    
</head>
<body>
    <main>
        <section aria-label="Resumo e Menu">
            <header>
                 <h1 id="brand-name" data-field="empresa_nome">CONFIE</h1>
                 <p id="professional-name" data-field="profissional_nome">Leticia Martins Silva</p>
            </header>

            <nav aria-label="Menu principal" aria-current="page">
                <a href="/dashboard" data-route="dashboard">Dashboard</a>                    
                <a href="/alunos" data-route="alunos">Alunos</a>
                <a href="/exercicios" data-route="exercicios">Exercícios</a>
                <a href="/treinos" data-route="treinos">Treinos</a>
                <a href="/agenda" data-route="agenda">Agenda</a>
                <a href="/mensagens" data-route="mensagens">Mensagens</a>
                <a href="/anamnese" data-route="anamnese">Anamnese</a>
                <a href="/financeiro" data-route="financeiro">Financeiro</a>  
            </nav>
                
        </section>
   
    
        <section aria-label="Conteúdo principal da Dashboard">
            <header>

            <h2>Dashboard</h2>
            <p id="welcome-message">Bem vindo(a), <span data-field="profissional_nome">Leticia Martins Silva</span></p>
            
            </header>

                
        <section aria-label="Indicadores principais">
                
            <article data-card="alunos">
                <h3>Alunos</h3> 
                    <strong id="total-alunos" data-field="total_alunos">3</strong>
                    <small>Total cadastrados</small>
            </article>

            <article data-card="sessoes">
                  <h3>Sessões</h3>
                    <strong id="total-sessoes" data-field="total_sessoes">0</strong>
                    <small>Aulas concluídas</small>
            </article>
                
            <article data-card="receita">
                  <h3>Receita</h3>
                    <strong id="total-receita" data-field="total_receita">R$ 0,00</strong>
                    <small>Total recebido</small>
            </article>

            <article data-card="atividade">
                  <h3>Atividade</h3>
                    <strong id="total-checkins" data-field="total_checkins">10</strong>
                    <span id="variacao-checkins" data-field="variacao_checkins">(33%)</span>
                    <small>Check-ins recentes</small>
            </article>

        </section>
            
        <section aria-label="Ações rápidas">
            
            <h3>Ações Rápidas</h3>

                <button type="button" data-action="adicionar-aluno">Adicionar Aluno</button>
                <button type="button" data-action="criar-treino">Criar Treino</button>
                <button type="button" data-action="agendar-aula">Agendar Aula</button>
        </section>

        <section aria-label="Dados para integração" hidden>
            <form id="dashboard-filters">

                <input type="hidden" name="profissional_id" value="" data-field="profissional_id">
                <input type="hidden" name="empresa_id" value="" data-field="empresa_id">
                <input type="hidden" name="periodo_inicio" value="" data-field="periodo_inicio">
                <input type="hidden" name="periodo_fim" value="" data-field="periodo_fim">

            </form>
        </section>
     </section>
    </main>
 </body>

</html>
