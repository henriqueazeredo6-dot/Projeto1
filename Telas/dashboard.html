<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - CONFIE</title>
     <link rel="stylesheet" href="style.css"> 
     <script src="https://unpkg.com/lucide@latest"></script>

     <style>
                
        main {
            display: flex !important;
            min-height: 100vh;
            background-color: #050507;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        /* Estilização da Sidebar  - baseado no style.css */
            main > section:first-child {
            flex: 0 0 240px;
            background-color: #09090b;
            border-right: 1px solid #1f1f23;
            padding: 40px 0;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
           
            }
        /* Ajuste do Conteúdo (Lado Direito) */
            main > section:last-child {
                    flex: 1;
                    padding: 40px 50px;
                    display: flex;
                    flex-direction: column;
                    justify-content: flex-start;
                    align-items:flex-start;
                    background-color: #050507;
                }        
            

        .brand {

            padding: 0 20px 40px ;
                                    
        }

        .brand h1, .header h1, .quick-action.actions h3 {
            font-family: 'Arial Black', sans-serif;
            font-weight: 900;
           
            text-transform: uppercase;
            letter-spacing: -2 px;
            line-height: 0.9;
                
        }

        .brand h1 {
            color: #ff5e00;
            font-size: 1.8rem;
           
        }

        .brand p {
            color: #52525b;
            font-size: 0.7rem;
            margin-top: 5px 0 0 ;
        }

        .header h1 {
            font-size: 4rem;
            color:#fff;
            margin: 0;
        }

        .header p {
            color: #71717a;
            font-size: 1rem;
            margin: 10 px 0 40px 0;
        }

        .nav-menu {
            display: flex;
            flex-direction: column;
            width: 100%;
        }
        .nav-menu a {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 24px;
            color: #a1a1aa;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 700;
            
        }

        .nav-menu a.active { 
            background-color: #ff5e00; 
            color: white; 
        }
        
        .stats-grid {
            width: 100%;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 50px;
        }

        .stat-card {
            padding: 24px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            border: 1px solid #1f1f23;
            background-color: #09090b;
        }

        
        .stat-card .top   {
            display: flex;
            align-items: center;
            justify-content: space-between;
            
        }

        .stat-card .top i {
            color: #ff5e00; width: 22px;

        }

        
        .stat-card .top span {
            color: #52525b;
            font-size: 0.65rem;
            font-weight: 800;
        }

        .stat-card strong {
            font-size: 2.5rem;
            font-weight: 900;
            color: #fff;
        }

        .stat-card p {
            margin: 0;
            color: #52525b;
            font-size: 0.75rem;
        }

        
        .action-card.active {
            font-weight: 900;
            background-color: #ff5e00;
            border-color: #ff5e00;
        }

        .actions-section { 
            width: 100%; 
        }

        .actions-section h3 { 
            font-size: 1.3rem; 
            margin-bottom: 25px; 
            color: #fff; 
        }

        .btn-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            width: 100%;
        }

        .btn-action {
            background: transparent;
            border: 1px solid #1f1f23;
            border-radius: 0;
            padding: 30px;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 15px;
            color: #fff;
            cursor: pointer;
            transition: 0.2s;
    }

        .btn-action.active {
            background-color: #ff5e00;
            border-color: #ff5e00;
            
        }

        .btn-action i {
            width: 22px;
            height: 22px;
        }

        .btn-action span {
            font-style: italic;
            font-weight: 800;
            text-transform: uppercase;
            font-size: 0.9rem;
        }



    </style>

</head>
<body>
    <main>
        <section>
            <div class="brand">
                 <h1 style="color: #ff5e00; font-weight: 900; font-style: italic;">CONFIE</h1>
                 <p style="font-size: 0.7rem; color: #71717a;">Leticia Martins Silva</p>
            </div>

            <nav class="menu">
                <a href="#" class="active"><i data-lucide="layout-dashboard"></i> Dashboard</a>
                <a href="#"><i data-lucide="users"></i> Alunos</a>
                <a href="#"><i data-lucide="dumbbell"></i> Exercícios</a>
                <a href="#"><i data-lucide="clipboard-list"></i> Treinos</a>
                <a href="#"><i data-lucide="calendar"></i> Agenda</a>
                <a href="#"><i data-lucide="message-square"></i> Mensagens</a>
                <a href="#"><i data-lucide="file-text"></i> Anamnese</a>
                <a href="#"><i data-lucide="dollar-sign"></i> Financeiro</a>  
            </nav>
                
        </section>
   
    
        <section>
            <header class="header">
                <h1 style="font-size: 3.5rem; font-weight: 900; font-style: italic; ">Dashboard</h1>
                <p style="color: #71717a;">Bem vindo(a), Leticia Martins Silva</p>
            </header>

                

        <div class="stats" style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 40px;">
            <article class="card">
                <div class="card-top">
                    <i data-lucide="users" style="color: #ff5e00;"></i>
                    <span>ALUNOS</span>                
                </div>
                <strong>3</strong>
                <p>Total Cadastrados</p>
            </article>

            <article class="card">
                <div class="card-top">
                    <i data-lucide="calendar" style="color: #ff5e00;"></i>
                    <span>SESSÕES</span>
                </div>
                <strong>5</strong>
                <p>Aulas Concluídas</p>
            </article>

            <article class="card">
                <div class="card-top">
                    <i data-lucide="dollar-sign" style="color: #ff5e00;"></i>
                    <span>RECEITA</span>
                </div>
                <strong>R$ 0,00</strong>
                <p>Total recebido</p>
            </article>

            <article class="card">
                <div class="card-top">
                    <i data-lucide="activity" style="color: #ff5e00;"></i>
                    <span>ATIVIDADE</span>
                </div>
                <div style="display: flex; align-items: baseline; gap: 5px;">
                <strong>10</strong>
                    <span style="color: #64d28a; font-size: 0.8rem; font-weight: bold;">(33%)</span>
                </div>
                <p>Check-ins recentes</p>
            </article>

        </div>
            
       
            <div class="action-grid" style="width: 100%;"> 
                 <h3 style="font-weight: 900; font-style: italic;  margin-bottom: 20px;">Ações rápidas</h3>
                 <div class="action-grid" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;">
                <button class="action-card active"> 
                    <i data-lucide="user-plus"></i>
                    <span>Adicionar aluno</span>
                </button>

                <button class="action-card">
                    <i data-lucide="activity"></i>
                    <span>Criar Treino</span>
                </button>

                <button class="action-card">
                    <i data-lucide="calendar-plus"></i>
                    <span>Agendar aula</span>
                </button>
            </div>
    </div>   
    </section>
    </main>
    
<script>
    lucide.createIcons();
</script>

</body>
</html>
