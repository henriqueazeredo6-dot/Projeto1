<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - CONFIE</title>
     <link rel="stylesheet" href="style.css"> 

     <style>
        .sidebar {
            width: 160px;
            background-color: #050507;
            border-right: 1px solid #1f1f23;
            padding: 16px 8px;
            display: flex;
            flex-direction: column;
        }

        .brand {
            display: block;
            padding: 4px 2px 18px;
            margin-bottom: 10px;
        }

        .brand h1 {
            color: #ff5e00;
            font-size: 1.75rem;
            font-weight: 900;
            line-height: 1;
            letter-spacing: 1px;
        }

        .brand p {
            margin-top: 6px;
            margin-bottom: 0;
            color: #6b7280;
            font-size: 0.68rem;
        }

        .menu {
            display:  flex;
            flex-direction: column;
            gap: 4px;
        }
        
        .menu a {
            display: flex;
            align-items: center;
            gap:10px;
            padding: 10px 12px;
            min-height: 38px;
            color: #a1a1aa;
            font-size: 0.9rem;
            font-weight:500;
        }

        .menu a.active {
            background-color: #ff5e00;
            color: #fff;
        }

        .icon {
            width: 14px;
            display:inline-flex;
            justify-content: center;
            font-size: 0.9rem;
        }

        .dashboard-layout {
            min-height: 100vh;
            align-items: stretch;
        }
    
        .content {
            flex: 1;
            padding: 24px 30px;
            background-color: #09090B;
        }

        .hero {
            font-size: 3.2rem;
            line-height: 1;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #fafafa;
            }
        
        .hero p {
            margin-top: 10px;
            margin-bottom: 0;
            font-size: 1rem;
            color: #71717a;
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .card {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 108px;
            padding: 14px 16px;
            border: 1px solid #27272a;
            background-color: #111114;
        }

        .card-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            color: #ff5e00;
        }


        .card-top span:last-child {
            color: #71717a;
            font-size: 0.68rem;
            letter-spacing: 0.5px;
        }

        .card strong {
            font-size: 2rem;
            line-height: 1;
            font-weight: 900;
            color: #FAFAFA;
        }

        .card p {
            margin: 0;
            color: #71717a;
            font-size: 0.82rem;
        }

        .activity-summary {
            display: flex;
            align-items: baseline;
            gap: 8px;
        }

        .positive {
            color: #64d28a;
            font-size: 0.82rem;
            font-weight: 700;
        }
            
    </style>

</head>
<body>
    <main class="dashboard-layout">
        <aside class="sidebar">
            <div class="brand">
                <h1>CONFIE</h1>
                <p>Bem vindo(a) Leticia Martins Silva</p>
            </div>
    
            <nav class="menu">
                <a class="active" href="#">
                    <span class="icon"></span>
                    <span>Dashboard</span>
                </a>

                <a href="#">
                    <span class="icon"></span>
                    <span>Alunos</span>
                </a>

                <a href="#">
                    <span class="icon"></span>
                    <span>Exercícios</span>
                </a>

                <a href="#">
                    <span class="icon"></span>
                    <span>Treinos</span>
                </a>

                <a href="#">
                    <span class="icon"></span>
                    <span>Agenda</span>
                </a>

                <a href="#">
                    <span class="icon"></span>
                    <span>Mensagem</span>
                </a>

                <a href="#">
                    <span class="icon"></span>
                    <span>Anamnese</span>
                </a>

                <a href="#">
                    <span class="icon"></span>
                    <span>Financeiro</span>
                </a>

            </nav>

        </aside>

        <section class="content">
            <header class="header">
                <h2>Dashboard</h2>
                <p>Bem vindo(a) Leticia Martins Silva</p>
            </header>

        <section class="stats">
            <article class="card">
                <div class="card-top">
                    <span></span>
                    <span>ALUNOS</span>                
                </div>
                <strong>3</strong>
                <p>Total Cadastrados</p>
            </article>

            <article class="card">
                <div class="card-top">
                    <span></span>
                    <span>SESSÕES</span>
                </div>
                <strong>5</strong>
                <p>Aulas Concluídas</p>
            </article>

            <article class="card">
                <div class="card-top">
                    <span>$</span>
                    <span>RECEITA</span>
                </div>
                <strong>R$ 0,00</strong>
                <p>Total recebido</p>
            </article>

            <article class="card">
                <div class="card-top">
                    <span>∿</span>
                    <span>ATIVIDADE</span>
                </div>
                <div class="activity-summary">
                <strong>10</strong>
                    <span class="positive">(33%)</span>
                </div>
                <p>Check-ins recentes</p>
            </article>








        </section>
            
       
        
        
    </main>
    
</body>
</html>
