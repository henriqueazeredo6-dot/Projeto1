<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - CONFIE</title>
     <link rel="stylesheet" href="style.css"> 

     <style>
        .sidebar {
            width: 160px;
            background-color: #050507;
            border-right: 1px solid #1f1f23;
            padding: 16px 8px;
            display: flex;
            flex-direction: column;
        }

        .brand {
            display: block;
            padding: 4px 2px 18px;
            margin-bottom: 10px;
        }

        .brand h1 {
            color: #ff5e00;
            font-size: 1.75rem;
            font-weight: 900;
            line-height: 1;
            letter-spacing: 1px;
        }

        .brand p {
            margin-top: 6px;
            margin-bottom: 0;
            color: #6b7280;
            font-size: 0.68rem;
        }

        .menu {
            display:  flex;
            flex-direction: column;
            gap: 4px;
        }
        
        .menu a {
            display: flex;
            align-items: center;
            gap:10px;
            padding: 10px 12px;
            min-height: 38px;
            color: #a1a1aa;
            font-size: 0.9rem;
            font-weight:500;
        }

        .menu a.active {
            background-color: #ff5e00;
            color: #fff;
        }

        .icon {
            width: 14px;
            display:inline-flex;
            justify-content: center;
            font-size: 0.9rem;
        }

     </style>
</head>
<body>
    <main class="dashboard-layout">
        <aside class="sidebar">
            <div class="brand">
                <h1>CONFIE</h1>
                <p>Bem vindo(a) Leticia Martins Silva</p>
            </div>
    
            <nav class="menu">
                <a class="active" href="#">
                    <span class="icon"></span>
                    <span>Dashboard</span>
                </a>

                <a href="#">
                    <span class="icon"></span>
                    <span>Alunos</span>
                </a>

                <a href="#">
                    <span class="icon"></span>
                    <span>Exercícios</span>
                </a>

                <a href="#">
                    <span class="icon"></span>
                    <span>Treinos</span>
                </a>

                <a href="#">
                    <span class="icon"></span>
                    <span>Agenda</span>
                </a>

                <a href="#">
                    <span class="icon"></span>
                    <span>Mensagem</span>
                </a>

                <a href="#">
                    <span class="icon"></span>
                    <span>Anamnese</span>
                </a>

                <a href="#">
                    <span class="icon"></span>
                    <span>Financeiro</span>
                </a>

            </nav>

        </aside>

        <section class="content">
        </section>
            
        <header.hero></header.hero>
        <section.stats></section.stats>
        <section.quick-actions></section.quick-actions>
        
    </main>
    
</body>
</html>
